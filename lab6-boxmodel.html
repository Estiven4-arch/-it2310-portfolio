
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 6 - CSS Box Model (Step 4)</title>
  <style>
    /* Turn border-box ON for Step 4 */
    *, *::before, *::after { box-sizing: border-box; }

    body { margin: 0; padding: 16px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    h1 { margin: 0 0 12px; }

    .box {
      border: 5px solid blue;
      padding: 20px;
      margin: 20px 0;
      background-color: lightgray;
      width: 300px; /* total stays 300px with border-box */
    }

    .experiment { border-color: green; } /* Box 3 */
  </style>
</head>
<body>
  <h1>CSS Box Model Lab</h1>

  <div class="box"><p>This is Box 1. It demonstrates the CSS Box Model.</p></div>
  <div class="box"><p>This is Box 2. Notice the margin between boxes.</p></div>
  <div class="box experiment"><p>This is Box 3. It has additional experimental styles.</p></div>
</body>
</html>
